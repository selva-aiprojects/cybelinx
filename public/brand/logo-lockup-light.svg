<svg width="960" height="260" viewBox="0 0 960 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="globeGrad2" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#4FD8FF"/>
      <stop offset="45%" stop-color="#0D47FF"/>
      <stop offset="100%" stop-color="#061034"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47FF"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <clipPath id="globeClip2">
      <circle cx="130" cy="130" r="100"/>
    </clipPath>
  </defs>

  <!-- ICON, scaled -->
  <g transform="translate(30,30)">
    <circle cx="100" cy="100" r="112" fill="none" stroke="url(#barGrad)" stroke-width="1" opacity="0.35"/>
    <circle cx="100" cy="100" r="100" fill="url(#globeGrad2)"/>
    <g clip-path="url(#globeClip2)" transform="translate(30,30)" stroke="#BFE9FF" stroke-width="0.9" fill="none" opacity="0.5">
      <ellipse cx="100" cy="100" rx="100" ry="34"/>
      <ellipse cx="100" cy="100" rx="100" ry="67"/>
      <ellipse cx="100" cy="100" rx="34" ry="100"/>
      <ellipse cx="100" cy="100" rx="67" ry="100"/>
    </g>
    <ellipse cx="88" cy="82" rx="43" ry="29" fill="#FFFFFF" opacity="0.14"/>
    <circle cx="100" cy="100" r="62" fill="none" stroke="#F5F9FF" stroke-width="28"
            stroke-dasharray="312 77" stroke-dashoffset="350"/>
  </g>

  <!-- WORDMARK: single continuous CYBELINX (no gap) -->
  <text
    x="252" y="152"
    font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', sans-serif"
    font-weight="900"
    font-size="76"
    letter-spacing="-1"
    fill="#0A0F1C">CYBELINX</text>

  <!-- Mask the "E" glyph and overlay bar-E -->
  <rect x="403" y="78" width="54" height="80" fill="#f8f9ff"/>
  <g transform="translate(403,92)">
    <rect x="0" y="0"  width="52" height="11" rx="5.5" fill="url(#barGrad)"/>
    <rect x="0" y="22" width="40" height="11" rx="5.5" fill="url(#barGrad)"/>
    <rect x="0" y="44" width="28" height="11" rx="5.5" fill="url(#barGrad)"/>
  </g>

  <!-- tagline -->
  <text x="252" y="198"
        font-family="'Arial', sans-serif" font-weight="300"
        font-size="17" letter-spacing="4" fill="#0D47FF" opacity="0.75">
    ENGINEERING INTELLIGENT ENTERPRISES
  </text>
</svg>
